<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Advanced Todo Card</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<main class="app" role="main">
			<div class="app-header">
				<span class="app-title">Task Manager</span>
				<div
					class="statistics"
					role="status"
					aria-live="polite"
					aria-label="Task summary"
				>
					<span class="statistic-badge" id="stat-total">0 tasks</span>
					<span
						class="statistic-badge statistic-badge--overdue"
						id="stat-overdue"
						hidden
						>0 overdue</span
					>
					<span
						class="statistic-badge statistic-badge--done"
						id="stat-done"
						hidden
						>0 done</span
					>
				</div>
			</div>

			<div class="filter-bar" role="group" aria-label="Filter tasks">
				<button
					class="filter-button filter-button--active"
					data-filter="all"
					onclick="setActiveFilter('all', this)"
				>
					All
				</button>
				<button
					class="filter-button"
					data-filter="active"
					onclick="setActiveFilter('active', this)"
				>
					Active
				</button>
				<button
					class="filter-button"
					data-filter="overdue"
					onclick="setActiveFilter('overdue', this)"
				>
					Overdue
				</button>
				<button
					class="filter-button"
					data-filter="done"
					onclick="setActiveFilter('done', this)"
				>
					Done
				</button>
			</div>

			<div
				id="task-list"
				class="task-list"
				role="list"
				aria-label="Task list"
				aria-live="polite"
			></div>
		</main>

		<script src="script.js"></script>
	</body>
</html>
